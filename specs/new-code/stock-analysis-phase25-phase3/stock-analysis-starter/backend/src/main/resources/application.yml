spring:
  application:
    name: stockanalysis-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stock_analysis}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jackson:
    default-property-inclusion: non_null
  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.rathore.stockanalysis: INFO

stockanalysis:
  exchange:
    default: NSE
  schema:
    nse:
      master: nse_exchange_symbol
      market: market_nse
      core-app: core_app_nse
    bse:
      master: bse_exchange_symbol
      market: market_bse
      core-app:
    nfo:
      master: nfo_exchange_symbol
      market: market_nfo
      core-app: core_app_nfo
    bfo:
      master: bfo_exchange_symbol
      market: market_bfo
      core-app:
    mcx:
      master: mcx_exchange_symbol
      market: market_mcx
      core-app:
