version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trading_analysis_db
      POSTGRES_USER: rathore
      POSTGRES_PASSWORD: rathore
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/dev/bootstrap-db.sql:/docker-entrypoint-initdb.d/001-bootstrap-db.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
