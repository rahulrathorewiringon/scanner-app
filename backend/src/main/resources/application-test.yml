spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jackson:
    default-property-inclusion: non_null
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data.sql

server:
  port: 8080

logging:
  level:
    root: INFO
    com.rathore.stockanalysis: DEBUG

stockanalysis:
  exchange:
    default: NSE
  schema:
    nse:
      master: nse_exchange_symbol
      market: market_nse
      core-app: core_app_nse
    bse:
      master: bse_exchange_symbol
      market: market_bse
      core-app:
    nfo:
      master: nfo_exchange_symbol
      market: market_nfo
      core-app: core_app_nfo
    bfo:
      master: bfo_exchange_symbol
      market: market_bfo
      core-app:
    mcx:
      master: mcx_exchange_symbol